<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Status Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

</head>

<body class="bg-slate-900 text-white">

<div id="app" class="p-6">

<h1 class="text-3xl font-bold text-center mb-6">
🚀 {{ config.APP_NAME }}
</h1>

<!-- GRID -->
<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

<div v-for="svc in services" :key="svc.name"
     class="bg-slate-800 p-5 rounded-2xl shadow">

  <h2 class="text-xl font-semibold mb-2">{{ svc.name }}</h2>

  <div class="text-2xl font-bold mb-2" :class="statusColor(svc)">
    {{ svc.statusText }}
  </div>

  <div class="text-sm space-y-1">
    <div>Latency: {{ svc.latency }} ms</div>
    <div>Uptime: {{ svc.uptimePercent }}%</div>
    <div>Checks: {{ svc.history.length }}</div>
  </div>

  <!-- mini history -->
  <div class="flex gap-1 mt-3">
    <div v-for="h in svc.history.slice(-20)"
         :class="h === 'ok' ? 'bg-green-500' : h === 'degraded' ? 'bg-yellow-400' : 'bg-red-500'"
         class="w-2 h-4 rounded">
    </div>
  </div>

</div>

</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data() {
  return {
    config: {},
    services: []
  }
},

methods: {

async loadConfig() {
  const res = await fetch('/api/env');
  this.config = await res.json();

  this.services = this.config.SERVICES.map(s => ({
    ...s,
    status: null,
    latency: 0,
    history: JSON.parse(localStorage.getItem(s.name) || "[]")
  }));

  Notification.requestPermission();
},

statusColor(svc) {
  if (!svc.status) return "text-gray-400";
  if (svc.status === "ok") return "text-green-500";
  if (svc.status === "degraded") return "text-yellow-400";
  return "text-red-500";
},

calculateUptime(history) {
  if (!history.length) return 100;
  const ok = history.filter(h => h === "ok").length;
  return ((ok / history.length) * 100).toFixed(1);
},

alert(svc) {
  if (Notification.permission === "granted") {
    new Notification(`${svc.name} DOWN`, {
      body: `Status: ${svc.status}`
    });
  }
},

async checkService(svc) {
  const start = performance.now();

  try {
    const res = await fetch(svc.url);
    const data = await res.json();

    const latency = Math.round(performance.now() - start);

    svc.status = data.status;
    svc.latency = latency;

    svc.history.push(data.status);
    if (svc.history.length > 100) svc.history.shift();

    localStorage.setItem(svc.name, JSON.stringify(svc.history));

    svc.uptimePercent = this.calculateUptime(svc.history);

    // ALERT CONDITIONS
    if (data.status === "fail" || latency > this.config.ALERT_THRESHOLD_MS) {
      this.alert(svc);
    }

  } catch (e) {
    svc.status = "fail";
    svc.latency = 0;

    svc.history.push("fail");
    this.alert(svc);
  }

  svc.statusText = svc.status?.toUpperCase() || "CHECKING";
},

async runChecks() {
  await Promise.all(this.services.map(s => this.checkService(s)));
}

},

async mounted() {
  await this.loadConfig();
  await this.runChecks();

  setInterval(this.runChecks, this.config.REFRESH_INTERVAL);
}

}).mount("#app");
</script>

</body>
</html>
